# This workflow packages the verified app.
# It is manual on purpose so Day 1 stays focused on CI.
name: 03 Build Artifact Workflow

on:
  # Students start this workflow manually from the Actions tab.
  workflow_dispatch:

env:
  # Keep common image values in one place so the build steps stay readable.
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  IMAGE_METADATA: image-metadata.env
  ARTIFACT_NAME: tiny-health-app-image

jobs:
  verify:
    name: Verify Application
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Get the repository files onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python so the workflow can run the tests first.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  package:
    name: Package (Python ${{ matrix.python-version }})
    needs: verify
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    env:
      IMAGE_TAR: tiny-health-app-${{ matrix.python-version }}.tar
      IMAGE_METADATA: image-metadata-${{ matrix.python-version }}.env
      ARTIFACT_NAME: tiny-health-app-image-py${{ matrix.python-version }}

    steps:
      - name: Check out repository
        # Get the repository files onto the runner.
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        # Use today's UTC date plus the GitHub run ID
        # This keeps the tag easy to explain and still unique for the run.
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image with Buildx
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}
          outputs: type=docker,dest=${{ env.IMAGE_TAR }}

      - name: Load Docker image
        run: |
          docker load -i "${IMAGE_TAR}"

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}
          format: sarif
          output: trivy-results-${{ matrix.python-version }}.sarif

      - name: Upload Trivy Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report-py${{ matrix.python-version }}
          path: trivy-results-${{ matrix.python-version }}.sarif
          retention-days: 7

      - name: Save image metadata
        # Keep the exact built image reference alongside the tar file.
        # The deploy workflow reads this file later instead of recreating the tag.
        run: |
          IMAGE_REFERENCE="${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
          printf 'IMAGE_TAG=%s\n' "${{ steps.image-tag.outputs.image_tag }}" > "${IMAGE_METADATA}"
          printf 'IMAGE_REFERENCE=%s\n' "${IMAGE_REFERENCE}" >> "${IMAGE_METADATA}"

      - name: Upload build artifact
        # Store the packaged output so a later workflow can use the exact same package.
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.IMAGE_TAR }}
            ${{ env.IMAGE_METADATA }}
          retention-days: 7
