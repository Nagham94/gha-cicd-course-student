# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:
  # This cron expression runs every day at 09:00 UTC.
  schedule:
    - cron: "0 9 * * *"

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest

    outputs:
      python_versions: ${{ steps.matrix.outputs.python_versions }}

    steps:
      - name: Read matrix secret
        id: matrix
        run: |
          echo "python_versions=${{ secrets.PYTHON_MATRIX }}" >> "$GITHUB_OUTPUT"

  run-tests:
    # Wait for the prepare job to publish the matrix.
    needs: prepare-matrix
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.prepare-matrix.outputs.python_versions) }}

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Show repository files
        run: ls -la

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }} 

      - name: Show Python version
        run: |
          echo "Matrix Python Version: ${{ matrix.python-version }}"
          python --version

      - name: Show runner time
        run: date

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v
